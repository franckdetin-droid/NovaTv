{% extends "base.html" %}

{% block title %}
Caméra Live - MY TV APP
{% endblock %}


{% block content %}


<section class="camera-live">


<h1>
🎥 Caméra Live
</h1>


<div class="live-status">

<span id="serverStatus">
🟡 Connexion au serveur...
</span>

<span id="liveStatus">
⏹ Aucun live
</span>

</div>



<h2>
📷 Aperçu caméra
</h2>



<div class="camera-box">


<video
id="camera"
autoplay
playsinline
muted>
</video>



<button id="fullscreenBtn">
⛶ Plein écran
</button>


</div>





<div class="live-buttons">


<button id="startBtn">
🔴 Démarrer le live
</button>



<button id="stopBtn">
⛔ Arrêter
</button>


</div>





<p id="message">
En attente...
</p>



</section>





<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>



<script>


const socket = io({
    reconnection:true,
    reconnectionAttempts:10
});



let stream = null;

let peerConnections = {};




const video =
document.getElementById("camera");


const message =
document.getElementById("message");


const serverStatus =
document.getElementById("serverStatus");


const liveStatus =
document.getElementById("liveStatus");



const room =
"camera_live_{{ session['user_id'] }}";







// ==========================
// CONNEXION SERVEUR
// ==========================


socket.on("connect",()=>{


serverStatus.innerHTML =
"🟢 Serveur connecté";


socket.emit(
"join_camera",
{
room:room
}
);


});





socket.on("disconnect",()=>{


serverStatus.innerHTML =
"🔴 Serveur déconnecté";


});









// ==========================
// CREATION CONNEXION
// ==========================


function createPeer(viewerId){



const peer =
new RTCPeerConnection({

iceServers:[

{
urls:"stun:stun.l.google.com:19302"
}

]

});




if(stream){


stream.getTracks().forEach(track=>{


peer.addTrack(
track,
stream
);


});


}




peer.onicecandidate=(event)=>{


if(event.candidate){


socket.emit(
"camera_ice",
{

target:viewerId,

candidate:event.candidate

}

);


}


};




peerConnections[viewerId]=peer;


return peer;


}









// ==========================
// NOUVEAU SPECTATEUR
// ==========================


socket.on(
"viewer_joined",
async(data)=>{


console.log(
"Nouveau spectateur",
data
);



const peer =
createPeer(data.viewer);



const offer =
await peer.createOffer();


await peer.setLocalDescription(
offer
);



socket.emit(
"camera_offer",
{

target:data.viewer,

offer:offer

}

);



});









// ==========================
// REPONSE DU SPECTATEUR
// ==========================


socket.on(
"camera_answer",
async(data)=>{


const peer =
peerConnections[data.viewer];



if(peer){


await peer.setRemoteDescription(

new RTCSessionDescription(
data.answer
)

);


}



});








// ==========================
// ICE
// ==========================


socket.on(
"camera_ice",
async(data)=>{


const peer =
peerConnections[data.viewer];



if(peer){


try{


await peer.addIceCandidate(
data.candidate
);


}catch(e){

console.log(e);

}


}



});










// ==========================
// DEMARRER LIVE
// ==========================


document
.getElementById("startBtn")
.onclick=async()=>{


try{


stream =
await navigator.mediaDevices.getUserMedia({

video:true,

audio:true

});



video.srcObject =
stream;




await fetch(
"/start-camera-live",
{

method:"POST",

headers:{

"Content-Type":
"application/json"

},

body:JSON.stringify({

room:room

})

}

);




liveStatus.innerHTML =
"🔴 LIVE EN COURS";


message.innerHTML =
"Votre caméra est en direct";




}catch(error){


message.innerHTML =
"❌ Erreur caméra : "
+
error.message;


}



};










// ==========================
// ARRET LIVE
// ==========================


document
.getElementById("stopBtn")
.onclick=()=>{


if(stream){


stream.getTracks()
.forEach(track=>track.stop());


}



Object.values(peerConnections)
.forEach(peer=>{


peer.close();


});



peerConnections={};



socket.emit(
"stop_camera",
{
room:room
}
);



liveStatus.innerHTML =
"⛔ Live arrêté";


message.innerHTML =
"Diffusion terminée";



};










// ==========================
// PLEIN ECRAN
// ==========================


document
.getElementById("fullscreenBtn")
.onclick=()=>{


if(video.requestFullscreen){


video.requestFullscreen();


}


};





</script>


{% endblock %}
