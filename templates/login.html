{% extends "base.html" %}

{% block title %}
Connexion - MY TV APP
{% endblock %}

{% block content %}

<section class="auth-box">

    <h1>🔐 Connexion</h1>

    <form method="POST">

        <input
        type="text"
        name="username"
        placeholder="Nom d'utilisateur"
        required>


        <input
        type="password"
        name="password"
        placeholder="Mot de passe"
        required>


        <button type="submit">
            Se connecter
        </button>

    </form>


    <p>
        Pas encore de compte ?
        <a href="{{ url_for('main.register') }}">
            Créer un compte
        </a>
    </p>

</section>

{% endblock %}

        </a>

    </p>



</section>


{% endblock %}
