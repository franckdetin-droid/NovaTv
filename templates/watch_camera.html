{% extends "base.html" %}

{% block title %}
Regarder live - MY TV APP
{% endblock %}


{% block content %}

<section class="watch-camera">

<h1>🔴 {{ live.title }}</h1>

<div class="live-player">

<video
id="liveVideo"
autoplay
playsinline
controls
width="100%">
</video>

<button id="fullscreenBtn">
⛶ Plein écran
</button>

</div>

<p id="status">
🟡 Connexion au live...
</p>

</section>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>

// ==========================
// SOCKET
// ==========================

const socket = io({
    reconnection: true,
    reconnectionAttempts: 20
});

// ==========================
// ELEMENTS
// ==========================

const video = document.getElementById("liveVideo");
const status = document.getElementById("status");

// ==========================
// SALLE
// ==========================

const room = "camera_live_{{ live.id }}";

let peer = null;
let creatorId = null; // 🔥 IMPORTANT

// ==========================
// CREATION WEBRTC
// ==========================

function createPeer(){

    peer = new RTCPeerConnection({
        iceServers: [
            { urls: "stun:stun.l.google.com:19302" }
        ]
    });

    // 🎥 réception vidéo
    peer.ontrack = (event) => {
        if (event.streams[0]) {
            video.srcObject = event.streams[0];
            status.innerHTML = "🔴 Live en cours";
        }
    };

    // 🧊 ICE
    peer.onicecandidate = (event) => {
        if (event.candidate && creatorId) {
            socket.emit("camera_ice", {
                candidate: event.candidate,
                target: creatorId
            });
        }
    };
}

// ==========================
// CONNEXION
// ==========================

socket.on("connect", () => {

    status.innerHTML = "🟢 Connecté";

    socket.emit("join_camera", {
        room: room
    });

});

// ==========================
// OFFRE CREATEUR
// ==========================

socket.on("camera_offer", async (data) => {

    try {

        if (!peer) {
            createPeer();
        }

        // 🔥 stocker le créateur
        creatorId = data.sender;

        await peer.setRemoteDescription(
            new RTCSessionDescription(data.offer)
        );

        const answer = await peer.createAnswer();
        await peer.setLocalDescription(answer);

        // 🔥 renvoyer au créateur
        socket.emit("camera_answer", {
            answer: answer,
            target: creatorId
        });

    } catch (error) {

        console.log(error);
        status.innerHTML = "❌ Erreur WebRTC";

    }

});

// ==========================
// ICE RECEPTION
// ==========================

socket.on("camera_ice", async (data) => {

    try {

        if (peer) {
            await peer.addIceCandidate(
                new RTCIceCandidate(data.candidate)
            );
        }

    } catch (error) {
        console.log("ICE error:", error);
    }

});

// ==========================
// LIVE STOP
// ==========================

socket.on("camera_stopped", () => {

    status.innerHTML = "⛔ Live terminé";
    video.srcObject = null;

    if (peer) {
        peer.close();
        peer = null;
    }

});

// ==========================
// ERREURS
// ==========================

socket.on("room_full", () => {
    status.innerHTML = "⚠️ Live complet";
});

socket.on("disconnect", () => {
    status.innerHTML = "🔴 Déconnecté";
});

// ==========================
// FULLSCREEN
// ==========================

document.getElementById("fullscreenBtn").onclick = () => {
    if (video.requestFullscreen) {
        video.requestFullscreen();
    }
};

</script>

{% endblock %}
