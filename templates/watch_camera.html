{% extends "base.html" %}

{% block title %}
Regarder caméra - MY TV APP
{% endblock %}


{% block content %}

<section class="watch-camera">


<h1>
🎥 {{ live.title }}
</h1>


<video
id="remoteVideo"
autoplay
playsinline
controls
width="100%">
</video>


<p id="status">
Connexion au live...
</p>


</section>



<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>


<script>


const socket = io();


const video =
document.getElementById("remoteVideo");


const status =
document.getElementById("status");



// Même salle que le créateur

const room =
"camera_live_{{ live.channel.owner.id }}";



let peer =
new RTCPeerConnection();




// recevoir le flux distant

peer.ontrack = (event)=>{


video.srcObject =
event.streams[0];


status.innerHTML =
"🔴 Live en cours";


};





peer.onicecandidate = (event)=>{


if(event.candidate){


socket.emit(
"camera_ice",
{
room:room,
candidate:event.candidate
}
);


}


};





// rejoindre la salle

socket.emit(
"join_camera",
{
room:room
}
);





// recevoir l'offre du créateur

socket.on(
"camera_offer",
async data=>{


await peer.setRemoteDescription(
data.offer
);



let answer =
await peer.createAnswer();



await peer.setLocalDescription(
answer
);



socket.emit(
"camera_answer",
{
room:room,
answer:answer
}
);



});





// recevoir arrêt du live

socket.on(
"camera_stopped",
()=>{


status.innerHTML =
"⛔ Live arrêté";


video.srcObject =
null;


});





// Nouveau spectateur arrivé

socket.on(
"viewer_joined",
async data => {


let offer =
await peer.createOffer();



await peer.setLocalDescription(
offer
);



socket.emit(
"camera_offer",
{
room:data.room,
offer:offer
}
);



});



</script>


{% endblock %}
