{% extends "base.html" %}

{% block title %}
Regarder live - MY TV APP
{% endblock %}


{% block content %}


<section class="watch-camera">


<h1>
🔴 {{ live.title }}
</h1>



<div class="live-player">


<video
id="liveVideo"
autoplay
playsinline
controls
width="100%">
</video>


</div>




<button id="fullscreenBtn">
⛶ Plein écran
</button>



<p id="status">
🟡 Connexion au live...
</p>



</section>





<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>



<script>


// ==========================
// SOCKET
// ==========================


const socket = io({

reconnection:true,

reconnectionAttempts:10

});





const video =
document.getElementById(
"liveVideo"
);



const status =
document.getElementById(
"status"
);





// ==========================
// SALLE DU LIVE
// ==========================


const room =
"camera_live_{{ live.id }}";





let peer = null;









// ==========================
// CREER WEBRTC
// ==========================


function createPeer(){



peer = new RTCPeerConnection({

iceServers:[

{

urls:
"stun:stun.l.google.com:19302"

}

]

});






// recevoir vidéo


peer.ontrack = (event)=>{


video.srcObject =
event.streams[0];


status.innerHTML =
"🔴 Live en cours";


};







// ICE


peer.onicecandidate =
(event)=>{


if(event.candidate){


socket.emit(
"camera_ice",
{

room:room,

candidate:event.candidate

}

);


}


};




return peer;


}









// ==========================
// CONNEXION SERVEUR
// ==========================


socket.on(
"connect",
()=>{


status.innerHTML =
"🟢 Serveur connecté";


socket.emit(
"join_camera",
{

room:room

}

);



}

);









// ==========================
// RECEVOIR OFFER CREATEUR
// ==========================


socket.on(
"camera_offer",
async(data)=>{


try{


if(!peer){

createPeer();

}




await peer.setRemoteDescription(

new RTCSessionDescription(
data.offer
)

);





const answer =
await peer.createAnswer();





await peer.setLocalDescription(
answer
);







socket.emit(
"camera_answer",
{

room:room,

answer:answer,

target:data.sender

}

);




}

catch(error){


console.log(
"Erreur offer:",
error
);


status.innerHTML =
"❌ Erreur connexion";


}


});









// ==========================
// RECEVOIR ICE
// ==========================


socket.on(
"camera_ice",
async(data)=>{


try{


if(peer){


await peer.addIceCandidate(

new RTCIceCandidate(
data.candidate
)

);


}


}

catch(error){


console.log(
"ICE erreur:",
error
);


}


});









// ==========================
// LIVE ARRETE
// ==========================


socket.on(
"camera_stopped",
()=>{


status.innerHTML =
"⛔ Live terminé";


video.srcObject =
null;



if(peer){


peer.close();


peer=null;


}



});









// ==========================
// ERREUR SALLE
// ==========================


socket.on(
"room_full",
()=>{


status.innerHTML =
"⚠️ Nombre maximum de spectateurs atteint";


});









// ==========================
// DECONNEXION
// ==========================


socket.on(
"disconnect",
()=>{


status.innerHTML =
"🔴 Connexion perdue";


});









// ==========================
// PLEIN ECRAN
// ==========================


document
.getElementById(
"fullscreenBtn"
)
.onclick=()=>{


if(video.requestFullscreen){


video.requestFullscreen();


}


};





</script>



{% endblock %}
