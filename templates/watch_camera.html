{% extends "base.html" %}

{% block title %}
Regarder live - MY TV APP
{% endblock %}

{% block content %}

<section class="watch-camera">

<h1>🔴 {{ live.title }}</h1>

<div class="live-player">

<video
id="liveVideo"
autoplay
playsinline
controls
width="100%">
</video>

</div>

<p id="status">
Connexion au live...
</p>

</section>


<!-- SOCKET.IO -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io();

const video = document.getElementById("liveVideo");
const status = document.getElementById("status");

// ✅ ROOM UNIQUE
const room = "camera_live_{{ live.id }}";

let peer = new RTCPeerConnection();


// ==========================
// RECEVOIR VIDEO
// ==========================
peer.ontrack = (event) => {
    video.srcObject = event.streams[0];
    status.innerHTML = "🔴 Live en cours";
};


// ==========================
// ICE (ENVOI)
// ==========================
peer.onicecandidate = (event) => {
    if (event.candidate) {
        socket.emit("camera_ice", {
            room: room,
            candidate: event.candidate
        });
    }
};


// ==========================
// REJOINDRE SALLE
// ==========================
socket.emit("join_camera", {
    room: room
});


// ==========================
// RECEVOIR OFFER
// ==========================
socket.on("camera_offer", async (data) => {
    try {
        await peer.setRemoteDescription(
            new RTCSessionDescription(data.offer)
        );

        const answer = await peer.createAnswer();

        await peer.setLocalDescription(answer);

        socket.emit("camera_answer", {
            room: room,
            answer: answer
        });

    } catch (e) {
        console.log("Erreur offer:", e);
    }
});


// ==========================
// RECEVOIR ICE
// ==========================
socket.on("camera_ice", async (data) => {
    try {
        await peer.addIceCandidate(
            new RTCIceCandidate(data.candidate)
        );
    } catch (e) {
        console.log("Erreur ICE:", e);
    }
});


// ==========================
// LIVE STOP
// ==========================
socket.on("camera_stopped", () => {
    status.innerHTML = "⛔ Live arrêté";
    video.srcObject = null;
});


// ==========================
// ROOM FULL
// ==========================
socket.on("room_full", () => {
    alert("⚠️ Live plein");
});

</script>

{% endblock %}
