{% extends "base.html" %}

{% block title %}
Regarder live - MY TV APP
{% endblock %}


{% block content %}


<section class="watch-camera">


<h1>
🔴 {{ live.title }}
</h1>



<div class="live-player">


<video
id="liveVideo"
controls
autoplay
playsinline
width="100%">
</video>


</div>



<p id="status">
Connexion au live...
</p>



</section>



<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>


<script>


const video =
document.getElementById("liveVideo");


const status =
document.getElementById("status");



// URL du live générée par ton serveur

const streamUrl =
"{{ live.stream_url }}";




if(Hls.isSupported()){


const hls =
new Hls();


hls.loadSource(
streamUrl
);


hls.attachMedia(
video
);



hls.on(
Hls.Events.MANIFEST_PARSED,
()=>{


video.play();


status.innerHTML =
"🔴 Live en cours";


});


hls.on(
Hls.Events.ERROR,
(event,data)=>{


console.log(
data
);


status.innerHTML =
"❌ Erreur de connexion";


});


}




else if(video.canPlayType(
'application/vnd.apple.mpegurl'
)){


video.src =
streamUrl;


video.addEventListener(
"loadedmetadata",
()=>{


video.play();


status.innerHTML =
"🔴 Live en cours";


});


}



else{


status.innerHTML =
"❌ Navigateur non compatible";


}



</script>


{% endblock %}
