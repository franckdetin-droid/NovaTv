{% extends "base.html" %}

{% block title %}
Inscription - MY TV APP
{% endblock %}

{% block content %}

<section class="auth-box">

    <h1>👤 Créer un compte</h1>

    <form method="POST">

        <input 
        type="text" 
        name="username" 
        placeholder="Nom d'utilisateur"
        required>


        <input 
        type="email" 
        name="email" 
        placeholder="Email"
        required>


        <input 
        type="password" 
        name="password" 
        placeholder="Mot de passe"
        required>


        <button type="submit">
            Créer mon compte
        </button>

    </form>


    <p>
        Déjà un compte ?
        <a href="{{ url_for('main.login') }}">
            Se connecter
        </a>
    </p>

</section>

{% endblock %}
