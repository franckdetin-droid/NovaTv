{% extends "base.html" %}


{% block title %}
Importer une vidéo - MY TV APP
{% endblock %}



{% block content %}

<section class="form-page">


    <h1>
        🎬 Importer une vidéo
    </h1>


    <form
        method="POST"
        action="{{ url_for('main.upload_video') }}"
        enctype="multipart/form-data">


        <!-- Chaîne -->

        <label>
            Chaîne
        </label>

        <select name="channel_id" required>

            {% for channel in channels %}

            <option value="{{ channel.id }}">
                {{ channel.name }}
            </option>

            {% endfor %}

        </select>



        <!-- Titre -->

        <label>
            Titre
        </label>

        <input
            type="text"
            name="title"
            placeholder="Titre de la vidéo"
            maxlength="200"
            required>



        <!-- Type -->

        <label>
            Type de contenu
        </label>

        <select name="content_type">


            <option value="film">
                🎬 Film
            </option>


            <option value="serie">
                📺 Série
            </option>


            <option value="journal">
                📰 Journal
            </option>


            <option value="emission">
                🎤 Émission
            </option>


            <option value="clip">
                🎵 Clip
            </option>


        </select>



        <!-- Catégorie -->

        <label>
            Catégorie
        </label>

        <input
            type="text"
            name="category"
            placeholder="Action, sport, musique...">



        <!-- Description -->

        <label>
            Description
        </label>

        <textarea
            name="description"
            placeholder="Description de la vidéo"></textarea>



        <!-- VIDEO CLOUDINARY DIRECT -->

        <label>
            Fichier vidéo
        </label>


        <input
            type="file"
            id="video"
            accept="video/*"
            required>


        <input
            type="hidden"
            name="video_url"
            id="video_url">



        <p id="upload_status"></p>



        <!-- Miniature -->

        <label>
            Miniature
        </label>


        <input
            type="file"
            name="thumbnail"
            accept="image/*">



        <button
            type="submit">

            🚀 Importer la vidéo

        </button>



    </form>


</section>




<script>

const videoInput =
document.getElementById("video");


const status =
document.getElementById("upload_status");


const videoUrl =
document.getElementById("video_url");



videoInput.addEventListener(
"change",
async function(){


    const file =
    videoInput.files[0];


    if(!file)
    return;



    status.innerHTML =
    "⏳ Envoi de la vidéo vers Cloudinary...";



    let formData =
    new FormData();



    formData.append(
        "file",
        file
    );


    formData.append(
        "upload_preset",
        "novatv_video"
    );



    try{


        let response =
        await fetch(

        "https://api.cloudinary.com/v1_1/kvua1rmc/video/upload",

        {

            method:"POST",

            body:formData

        }

        );



        let data =
        await response.json();



        console.log(data);



        if(data.secure_url){


            videoUrl.value =
            data.secure_url;



            status.innerHTML =
            "✅ Vidéo envoyée avec succès";


        }

        else{


            status.innerHTML =
            "❌ Erreur Cloudinary";


        }



    }


    catch(error){


        console.log(error);


        status.innerHTML =
        "❌ Erreur connexion";


    }



});


</script>



{% endblock %}
