{% extends "base.html" %}


{% block title %}
Importer une vidéo - MY TV APP
{% endblock %}



{% block content %}


<section class="form-page">


<h1>
🎬 Importer une vidéo
</h1>




<form
id="uploadForm"
method="POST"
action="{{ url_for('main.upload_video') }}"
enctype="multipart/form-data">






<label>
Chaîne
</label>


<select name="channel_id" required>

{% for channel in channels %}

<option value="{{ channel.id }}">
{{ channel.name }}
</option>

{% endfor %}

</select>








<label>
Titre
</label>


<input
type="text"
name="title"
placeholder="Titre de la vidéo"
maxlength="200"
required>








<label>
Type de contenu
</label>


<select name="content_type">


<option value="film">
🎬 Film
</option>


<option value="serie">
📺 Série
</option>


<option value="journal">
📰 Journal
</option>


<option value="emission">
🎤 Émission
</option>


<option value="clip">
🎵 Clip
</option>


</select>








<label>
Catégorie
</label>


<input
type="text"
name="category"
placeholder="Action, sport, musique...">








<label>
Description
</label>


<textarea
name="description"
placeholder="Description"></textarea>









<label>
Vidéo
</label>


<input
type="file"
id="video"
accept="video/*"
required>




<input
type="hidden"
name="video_url"
id="video_url">







<div class="upload-progress">


<progress
id="progressBar"
value="0"
max="100">
</progress>



<p id="upload_status">
Aucune vidéo sélectionnée
</p>


</div>









<label>
Miniature
</label>


<input
type="file"
name="thumbnail"
accept="image/*">







<button
type="submit"
id="submit_btn"
disabled>


🚀 Importer la vidéo


</button>





</form>



</section>









<script>



const form =
document.getElementById(
"uploadForm"
);



const videoInput =
document.getElementById(
"video"
);



const videoUrl =
document.getElementById(
"video_url"
);



const status =
document.getElementById(
"upload_status"
);



const progressBar =
document.getElementById(
"progressBar"
);



const button =
document.getElementById(
"submit_btn"
);




let uploading = false;








videoInput.addEventListener(
"change",
function(){



const file =
videoInput.files[0];



if(!file)
return;




uploading = true;

button.disabled = true;



progressBar.value = 0;



status.innerHTML =
"⏳ Préparation de l'envoi...";







let formData =
new FormData();



formData.append(
"file",
file
);



formData.append(
"upload_preset",
"novatv_video"
);







let xhr =
new XMLHttpRequest();







xhr.upload.addEventListener(
"progress",
function(event){



if(event.lengthComputable){



let percent =
(event.loaded / event.total) * 100;



progressBar.value =
percent;



status.innerHTML =
"⏳ Envoi : "
+
percent.toFixed(0)
+
"%";


}



});










xhr.onload =
function(){



if(xhr.status === 200){



let data =
JSON.parse(
xhr.responseText
);





if(data.secure_url){



videoUrl.value =
data.secure_url;



status.innerHTML =
"✅ Vidéo envoyée avec succès";



button.disabled =
false;



}

else{


status.innerHTML =
"❌ Cloudinary n'a pas retourné d'URL";


}



}



else{


status.innerHTML =
"❌ Erreur Cloudinary";


}



uploading = false;



};









xhr.onerror =
function(){


uploading = false;


status.innerHTML =
"❌ Erreur réseau pendant l'envoi";


};









xhr.open(

"POST",

"https://api.cloudinary.com/v1_1/kvua1rmc/video/upload"

);





xhr.send(
formData
);



});









form.addEventListener(
"submit",
function(e){



if(uploading || !videoUrl.value){



e.preventDefault();



alert(
"Veuillez attendre la fin de l'envoi de la vidéo."
);



}



});





</script>





{% endblock %}
