{% extends "base.html" %}


{% block title %}
Importer une vidéo - MY TV APP
{% endblock %}



{% block content %}


<section class="form-page">


<h1>
🎬 Importer une vidéo
</h1>



<form
method="POST"
action="{{ url_for('main.upload_video') }}"
enctype="multipart/form-data">



<label>
Chaîne
</label>


<select name="channel_id" required>

{% for channel in channels %}

<option value="{{ channel.id }}">
{{ channel.name }}
</option>

{% endfor %}

</select>




<label>
Titre
</label>


<input
type="text"
name="title"
placeholder="Titre de la vidéo"
required>





<label>
Type de contenu
</label>


<select name="content_type">

<option value="film">
🎬 Film
</option>

<option value="serie">
📺 Série
</option>

<option value="journal">
📰 Journal
</option>

<option value="emission">
🎤 Émission
</option>

<option value="clip">
🎵 Clip
</option>

</select>





<label>
Catégorie
</label>


<input
type="text"
name="category"
placeholder="Action, sport, musique...">





<label>
Description
</label>


<textarea
name="description"
placeholder="Description"></textarea>






<label>
Vidéo
</label>


<input
type="file"
id="video"
accept="video/*"
required>



<input
type="hidden"
name="video_url"
id="video_url">



<p id="upload_status">
Aucune vidéo sélectionnée
</p>






<label>
Miniature
</label>


<input
type="file"
name="thumbnail"
accept="image/*">






<button
type="submit"
id="submit_btn">

🚀 Importer la vidéo

</button>



</form>



</section>







<script>


const videoInput =
document.getElementById("video");


const videoUrl =
document.getElementById("video_url");


const status =
document.getElementById("upload_status");


const button =
document.getElementById("submit_btn");



let uploading = false;



button.disabled = true;




videoInput.addEventListener(
"change",
async function(){



const file =
videoInput.files[0];



if(!file){

return;

}



uploading = true;

button.disabled = true;



status.innerHTML =
"⏳ Envoi vers Cloudinary...";



let formData =
new FormData();



formData.append(
"file",
file
);



formData.append(
"upload_preset",
"novatv_video"
);





try{


let response =
await fetch(

"https://api.cloudinary.com/v1_1/kvua1rmc/video/upload",

{

method:"POST",

body:formData

}

);




let data =
await response.json();




console.log(data);





if(data.secure_url){


videoUrl.value =
data.secure_url;



status.innerHTML =
"✅ Vidéo envoyée avec succès";



button.disabled = false;



}

else{


status.innerHTML =
"❌ Erreur Cloudinary";



}





}


catch(error){


console.log(error);


status.innerHTML =
"❌ Erreur réseau";


}



uploading = false;



});






document.querySelector("form")
.addEventListener(
"submit",
function(e){



if(uploading || !videoUrl.value){


e.preventDefault();



alert(
"Attendez la fin de l'envoi Cloudinary avant de continuer."
);



}



});



</script>




{% endblock %}
