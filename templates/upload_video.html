{% extends "base.html" %}


{% block title %}
Importer une vidéo - MY TV APP
{% endblock %}



{% block content %}


<link href="https://releases.transloadit.com/uppy/v3.3.1/uppy.min.css" rel="stylesheet">


<section class="form-page">


<h1>
🎬 Importer une vidéo PRO
</h1>



<form
id="uploadForm"
method="POST"
action="{{ url_for('main.upload_video') }}"
enctype="multipart/form-data">



<label>
Chaîne
</label>


<select name="channel_id" required>

{% for channel in channels %}

<option value="{{ channel.id }}">
{{ channel.name }}
</option>

{% endfor %}

</select>




<label>
Titre
</label>


<input
type="text"
name="title"
maxlength="200"
required>




<label>
Type de contenu
</label>


<select name="content_type">

<option value="film">🎬 Film</option>

<option value="serie">📺 Série</option>

<option value="journal">📰 Journal</option>

<option value="emission">🎤 Émission</option>

<option value="clip">🎵 Clip</option>

</select>




<label>
Catégorie
</label>


<input
type="text"
name="category"
placeholder="Action, sport, musique...">





<label>
Description
</label>


<textarea
name="description"></textarea>





<!-- ==========================
UPLOAD VIDEO YOUTUBE STYLE
========================== -->


<label>
🎬 Vidéo
</label>


<div id="drag-drop-area"></div>


<input
type="hidden"
name="video_url"
id="video_url">



<p id="upload_status">
Aucune vidéo sélectionnée
</p>






<label>
Miniature
</label>


<input
type="file"
name="thumbnail"
accept="image/*">






<button
type="submit"
id="submit_btn"
disabled>

🚀 Publier la vidéo

</button>




</form>


</section>





<script src="https://releases.transloadit.com/uppy/v3.3.1/uppy.min.js"></script>



<script>


const uploadStatus =
document.getElementById(
"upload_status"
);



const videoUrl =
document.getElementById(
"video_url"
);



const submitBtn =
document.getElementById(
"submit_btn"
);




// ==========================
// UPPY CONFIGURATION
// ==========================


const uppy = new Uppy.Core({


restrictions:{


maxFileSize:5000000000,


allowedFileTypes:[
"video/*"
]


},


autoProceed:false


});





uppy.use(
Uppy.Dashboard,
{


inline:true,


target:"#drag-drop-area",


note:
"Glisse ta vidéo ici ou clique (5GB max)",


proudlyDisplayPoweredByUppy:false


}
);






// ==========================
// CLOUDINARY
// ==========================


uppy.use(
Uppy.XHRUpload,
{


endpoint:
"https://api.cloudinary.com/v1_1/kvua1rmc/video/upload",


fieldName:"file",


formData:true


}
);






// ==========================
// PRESET CLOUDINARY
// ==========================


uppy.on(
"file-added",
function(){


uppy.setMeta({


upload_preset:
"novatv_video"


});


uploadStatus.innerHTML =
"⏳ Prêt pour l'envoi";


});






// ==========================
// FIN UPLOAD
// ==========================


uppy.on(
"complete",
function(result){



if(result.successful.length > 0){



const file =
result.successful[0];



videoUrl.value =
file.response.body.secure_url;




uploadStatus.innerHTML =
"✅ Vidéo envoyée avec succès";



submitBtn.disabled =
false;



}



});



</script>



{% endblock %}
