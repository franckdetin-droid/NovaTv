{% extends "base.html" %}


{% block title %}
Importer une vidéo - MY TV APP
{% endblock %}



{% block content %}

<section class="form-page">


    <h1>
        🎬 Importer une vidéo
    </h1>


    <form
        method="POST"
        action="{{ url_for('main.upload_video') }}"
        enctype="multipart/form-data">


        <!-- Chaîne -->

        <label>
            Chaîne
        </label>

        <select name="channel_id" required>

            {% for channel in channels %}

            <option value="{{ channel.id }}">
                {{ channel.name }}
            </option>

            {% endfor %}

        </select>



        <!-- Titre -->

        <label>
            Titre
        </label>

        <input
            type="text"
            name="title"
            placeholder="Titre de la vidéo"
            maxlength="200"
            required>



        <!-- Type -->

        <label>
            Type de contenu
        </label>

        <select name="content_type">


            <option value="film">
                🎬 Film
            </option>


            <option value="serie">
                📺 Série
            </option>


            <option value="journal">
                📰 Journal
            </option>


            <option value="emission">
                🎤 Émission
            </option>


            <option value="clip">
                🎵 Clip
            </option>


        </select>



        <!-- Catégorie -->

        <label>
            Catégorie
        </label>

        <input
            type="text"
            name="category"
            placeholder="Action, sport, musique...">



        <!-- Description -->

        <label>
            Description
        </label>

        <textarea
            name="description"
            placeholder="Description de la vidéo"></textarea>




        <!-- Vidéo -->

        <label>
            Fichier vidéo
        </label>

        <input
            type="file"
            name="video"
            accept="video/*"
            required>



        <!-- Miniature -->

        <label>
            Miniature
        </label>

        <input
            type="file"
            name="thumbnail"
            accept="image/*">



        <button
            type="submit">

            🚀 Importer la vidéo

        </button>



    </form>


</section>


{% endblock %}
