{% extends "base.html" %}


{% block title %}
Importer une vidéo - MY TV APP
{% endblock %}



{% block content %}



<section class="form-page">



<h1>
🎬 Importer une vidéo
</h1>





<form
method="POST"
action="{{ url_for('main.upload_video') }}"
enctype="multipart/form-data">





<label>
Chaîne
</label>


<select name="channel_id"
required>


{% for channel in channels %}


<option value="{{ channel.id }}">

{{ channel.name }}

</option>


{% endfor %}


</select>








<label>
Titre
</label>


<input
type="text"
name="title"
placeholder="Titre du programme"
maxlength="200"
required>








<label>
Type de contenu
</label>


<select name="content_type">



<option value="film">
Film
</option>



<option value="journal">
Journal
</option>



<option value="emission">
Émission
</option>



<option value="clip">
Clip
</option>



</select>








<label>
Catégorie
</label>


<input
type="text"
name="category"
placeholder="Catégorie">








<label>
Description
</label>


<textarea
name="description">
</textarea>








<label>
Fichier vidéo
</label>


<input
type="file"
name="video"
accept="video/*"
required>








<label>
Miniature
</label>


<input
type="file"
name="thumbnail"
accept="image/*"
required>








<button
type="submit">

☁️ Envoyer sur Cloudinary

</button>





</form>



</section>



{% endblock %}
