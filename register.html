{% extends "base.html" %}


{% block title %}
Inscription - MY TV APP
{% endblock %}



{% block content %}


<section class="auth-box">


    <h1>
        👤 Créer un compte
    </h1>



    <form method="POST" action="{{ url_for('main.register') }}">



        <label>
            Nom d'utilisateur
        </label>


        <input
        type="text"
        name="username"
        minlength="3"
        maxlength="100"
        autocomplete="username"
        required>




        <label>
            Email
        </label>


        <input
        type="email"
        name="email"
        autocomplete="email"
        required>




        <label>
            Mot de passe
        </label>


        <input
        type="password"
        name="password"
        minlength="8"
        autocomplete="new-password"
        required>




        <button type="submit">
            Créer mon compte
        </button>



    </form>



    <p>

        Déjà un compte ?

        <a href="{{ url_for('main.login') }}">
            Se connecter
        </a>

    </p>



</section>


{% endblock %}
